<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Spotify</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="./img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="./login.css">
</head>
<body>
    <div class="container">
        <div class="logo"><img src="./img/spotify-logo.png" alt=""></div>

        <h1>Log in to Spotify</h1>

        <form action="">
            <button class="icon-btn"><img src="./img/google.png" alt="">Sign up with Google</button>
            <button class="icon-btn"><img src="./img/facebook.png" alt="">Sign up with Facebook</button>
            <button class="icon-btn"><img src="./img/apple.png" alt="">Sign up with Apple</button>
            <button class="icon-btn">Continue with phone number</button>

            <div class="line"></div>

            <label for="">Email or username</label><br>
            <input type="text" placeholder="Email or username"><br>
            <label for="">Password</label><br>
            <input type="text" placeholder="Password"><br>
    

            <button class="next"><a href="index.html"> Log In</a> </button>  
    
            
            
            <div class="forget"><a href="forgot.html">Forget password?</a></div>

            <div class="account">Don't have an account? <a href="./signup.html">Sign up for Spotify</a></div>


        </form>

        <p class="term">This site protected by reCAPTCHA and the google <br> <a href="" class="privacy">Privacy Policy</a>
        and <a href="" class="privacy">Term of Service </a> apply.
        </p>


    </div>
</body>
</html>
