<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <link rel="shortcut icon" href="favicon.png" type="image/x-icon" />
  <title>Spotify - Web Player: Music for everyone</title>
    <style>
      body {
 background: linear-gradient(to bottom, #1db954, #191414);   
   }
      * {
        margin: 0;
        padding: 0;
        font-family: SpotifyMixUITitle, CircularSp-Arab, CircularSp-Hebr,
          CircularSp-Cyrl, CircularSp-Grek, CircularSp-Deva,
          var(--fallback-fonts, sans-serif);
      }
      .main {
        display: flex;
        min-height: 100vh;
        justify-content: center;
        align-items: center;
      }
      .content {
        margin: 5px;
        padding: 7px;
         
          height: 100%;
       
          border-radius: 22px;

      }
      .content img {
        padding: 10px;
        height: 50px;
        filter: invert(0);
       
      }
      .btn {
        width: 150px;
        height: 41px;
        border-radius: 40px;
        border: none;
        outline: none;
        color: rgb(0, 0, 0);
        font-weight: bolder;
        font-size: 15px;
        background-color: #27a93c;
        box-shadow: 3px 2px 10px rgb(23, 22, 23);
        cursor: pointer;
        margin-top: 15px;
        /* position: relative;
        left: 20%; */
      
      }
      .btn:hover{
        background-color: #fdfdfd;
        color: rgb(0, 0, 0);
      }
      .content .p1 {
        font-weight: bolder;
        font-size: 50px;
        color: rgb(252, 250, 250);
        text-align: center;
      }

      .p2{
        color: rgb(238, 233, 233);
        padding: 5px;
        font-weight :bolder;
       
      }
      .button{
        padding-bottom: 50px;
      }
      span{
        color: black;
          font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="content">
        <img src="logo.svg" alt="" />
        <p class="p1">Welcome to <span>Spotify</span></p>
        <p class="p2">Millions of songs and podcasts.Free on Spotify</p>
        <div class="button">
           <button class="btn" id="btn">Sign up free</button>
        </div>
       
      </div>
    </div>
    <script>
const btn = document.getElementById("btn")
btn.addEventListener("click",()=>{
   window.location.href = "signup.html";
})

    </script>
  </body>
</html>
